name: Run Selenium Script

on:
  schedule:
     - cron: '0 */1 * * *'
  workflow_dispatch:        # Allows manual trigger from GitHub UI

jobs:
  selenium:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

     

      - name: Run Selenium script
        run: |
          python your_script.py
